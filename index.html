const STORAGE_KEY = "comeback-coach-rpg-v2";
function load(){ try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):null;}catch{return null;} }
function save(s){ try{localStorage.setItem(STORAGE_KEY,JSON.stringify(s));return true;}catch{return false;} }
function getPhase(xp){ for(let i=PHASES.length-1;i>=0;i--) if(xp>=PHASES[i].xpNeeded) return PHASES[i]; return PHASES[0]; }
function getNextPhase(xp){ const c=getPhase(xp); return PHASES.find(p=>p.id===c.id+1)||null; }
function getProgress(xp){ const c=getPhase(xp),n=getNextPhase(xp); if(!n) return 100; return Math.min(100,Math.round(((xp-c.xpNeeded)/(n.xpNeeded-c.xpNeeded))*100)); }

function StatBar({statKey,value}){

  return (

      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
        <span style={{fontSize:12,color:C.muted}}>{m.icon} {m.label}</span>
        <span style={{fontSize:12,fontWeight:600,color:m.color}}>{value}</span>
      </div>

      </div>
    </div>
  );
}

// ── Radar Chart ──
function RadarChart({stats}){
  const keys=["str","agi","end","pwr","vit"];
  const cx=120,cy=115,maxR=78,maxVal=50;
  const angle=(i)=>(Math.PI*2*(i/5))-(Math.PI/2);
  const pt=(i,r)=>({x:cx+r*Math.cos(angle(i)),y:cy+r*Math.sin(angle(i))});
  const rings=[0.25,0.5,0.75,1];
  const polyPts=(r)=>keys.map((_,i)=>`${pt(i,r).x},${pt(i,r).y}`).join(" ");
  const statPts=keys.map((k,i)=>{
    const r=(Math.min(stats[k]||1,maxVal)/maxVal)*maxR;
    return `${pt(i,r).x},${pt(i,r).y}`;
  }).join(" ");
  const statColors=["#e87070","#70c490","#70a8e8","#c090e8","#e8a0b0"];
  const lp=(i)=>pt(i,maxR+16);
  return (
    <svg viewBox="0 0 240 210" width="100%" style={{maxWidth:240,display:"block",margin:"0 auto"}}>
      {rings.map((r,ri)=>(
        <polygon key={ri} points={polyPts(maxR*r)}
          fill={ri===rings.length-1?"rgba(212,116,138,0.04)":"none"}
          stroke="rgba(180,130,130,0.18)" strokeWidth="0.8"/>
      ))}
      {keys.map((_,i)=>{
        const p=pt(i,maxR);
        return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="rgba(180,130,130,0.18)" strokeWidth="0.8"/>;
      })}
      <polygon points={statPts}
        fill="rgba(212,116,138,0.15)" stroke={C.rose} strokeWidth="1.8"
        strokeLinejoin="round" style={{transition:"all 0.5s"}}/>
      {keys.map((k,i)=>{
        const r=(Math.min(stats[k]||1,maxVal)/maxVal)*maxR;
        const p=pt(i,r);
        return <circle key={k} cx={p.x} cy={p.y} r={3.5}
          fill={statColors[i]} stroke="rgba(253,246,240,0.9)" strokeWidth="1.5"
          style={{transition:"all 0.5s"}}/>;
      })}
      {keys.map((k,i)=>{
        const l=lp(i);
        const m=statMeta[k];
        return (
          <g key={k}>
            <text x={l.x} y={l.y-2} textAnchor="middle" fontSize="9" fill={statColors[i]}
              fontFamily="Jost,sans-serif" fontWeight="600" letterSpacing="0.5">{m.label.toUpperCase()}</text>
            <text x={l.x} y={l.y+10} textAnchor="middle" fontSize="12" fill={statColors[i]}
              fontFamily="Jost,sans-serif" fontWeight="700">{stats[k]||1}</text>
          </g>
        );
      })}
    </svg>
  );
}

function WorkoutCard({workout,onStart,completed}){
  const phase=PHASES.find(p=>p.id===workout.phase);
  const [hov,setHov]=useState(false);
  const typeIcon=workout.type.includes("Cardio")?"🚴":workout.type.includes("Mobility")?"🧘":workout.type.includes("Power")?"⚡":workout.type.includes("Agility")?"🏃":"💪";
  return (
    <div onClick={()=>onStart(workout)} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{background:completed?"rgba(255,235,235,0.7)":hov?"rgba(255,255,255,0.92)":"rgba(255,255,255,0.65)",
        border:`1.5px solid ${completed?"rgba(212,116,138,0.35)":hov?"rgba(212,116,138,0.3)":"rgba(220,180,180,0.22)"}`,
        borderRadius:16,padding:"14px 16px",cursor:"pointer",transition:"all 0.2s",
        transform:hov?"translateY(-1px)":"none",
        boxShadow:hov?"0 6px 20px rgba(212,116,138,0.1)":"0 2px 8px rgba(212,116,138,0.05)",
        backdropFilter:"blur(6px)",position:"relative"}}>
      {completed&&<div style={{position:"absolute",top:10,right:12,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
        <span style={{fontSize:13}}>🌸</span>
        <span style={{fontSize:9,color:C.rose,background:"rgba(212,116,138,0.1)",borderRadius:99,padding:"1px 7px",border:`1px solid rgba(212,116,138,0.2)`}}>repeat ↺</span>
      </div>}
      <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
        <div style={{width:38,height:38,borderRadius:12,flexShrink:0,fontSize:18,
          background:`${phase.color}18`,border:`1px solid ${phase.color}35`,
          display:"flex",alignItems:"center",justifyContent:"center"}}>{typeIcon}</div>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:600,color:C.text}}>{workout.title}</div>
          <div style={{fontSize:11,color:C.muted,marginTop:2}}>{workout.type} · {workout.duration} min</div>
          <div style={{display:"flex",gap:5,marginTop:7,flexWrap:"wrap"}}>
            {workout.equipment.map(e=>(
              <span key={e} style={{fontSize:10,background:"rgba(255,255,255,0.8)",border:"1px solid rgba(220,180,180,0.25)",borderRadius:99,padding:"2px 8px",color:C.muted}}>
                {e==="Bike"?"🚴":e==="Ball"?"⚽":"🧘"} {e}
              </span>
            ))}
            <span style={{fontSize:10,background:`${C.rose}12`,border:`1px solid ${C.rose}25`,borderRadius:99,padding:"2px 8px",color:C.rose}}>
              {completed?`+${Math.floor(workout.xp/2)} xp (repeat)`:`+${workout.xp} xp`}
            </span>
            {!completed&&Object.entries(workout.statGains).map(([k,v])=>(
              <span key={k} style={{fontSize:10,background:`${statMeta[k].color}10`,border:`1px solid ${statMeta[k].color}25`,borderRadius:99,padding:"2px 8px",color:statMeta[k].color}}>
                {statMeta[k].icon}+{v}
              </span>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Exercise Diagrams ──
// Two-frame start→end SVG diagrams
const PK = "#d4748a";
const STROKE = 2.8;

function Head({cx,cy,r=9}){
  return <circle cx={cx} cy={cy} r={r} fill="none" stroke="currentColor" strokeWidth={STROKE} strokeLinecap="round"/>;
}
function Seg({x1,y1,x2,y2}){
  return <line x1={x1} y1={y1} x2={x2} y2={y2} stroke="currentColor" strokeWidth={STROKE} strokeLinecap="round"/>;
}
function Floor2({y,x1=10,x2=270}){
  return <line x1={x1} y1={y} x2={x2} y2={y} stroke={PK} strokeWidth={1} strokeOpacity={0.3} strokeLinecap="round"/>;
}
function Divider({h=170}){
  return <line x1={140} y1={12} x2={140} y2={h} stroke={PK} strokeWidth={1} strokeOpacity={0.22} strokeDasharray="4 3"/>;
}
function FL({x,text,y=14}){
  return <text x={x} y={y} fontSize="10" fill={PK} textAnchor="middle" fontFamily="Jost,sans-serif" opacity="0.85">{text}</text>;
}
function Cue({x,y,text,anchor="middle"}){
  return <text x={x} y={y} fontSize="9.5" fill={PK} textAnchor={anchor} fontFamily="Jost,sans-serif">{text}</text>;
}
function Arr({x1,y1,x2,y2,color=PK}){
  const ang=Math.atan2(y2-y1,x2-x1),al=8;
  return <g stroke={color} strokeWidth={2} strokeLinecap="round" fill="none">
    <line x1={x1} y1={y1} x2={x2} y2={y2}/>
    <line x1={x2} y1={y2} x2={x2-al*Math.cos(ang-0.42)} y2={y2-al*Math.sin(ang-0.42)}/>
    <line x1={x2} y1={y2} x2={x2-al*Math.cos(ang+0.42)} y2={y2-al*Math.sin(ang+0.42)}/>
  </g>;
}
function Ball({cx,cy,r=10}){
  return <circle cx={cx} cy={cy} r={r} fill="rgba(212,116,138,0.14)" stroke={PK} strokeWidth={1.5}/>;
}

// Reusable stick figure poses
// Standing upright: cx = centre x, baseY = floor y
function StandFig({cx,baseY,color,opacity=1,armL=null,armR=null,legLKnee=null,legRKnee=null,legLFoot=null,legRFoot=null}){
  const hy=baseY-105, ty=baseY-88, sy=baseY-65, hy2=baseY-45;
  const defLL={x:cx-10,y:baseY-10},defLR={x:cx+10,y:baseY-10};
  const defFL={x:cx-12,y:baseY},defFR={x:cx+12,y:baseY};
  const ll=legLKnee||defLL,lr=legRKnee||defLR;
  const fl=legLFoot||defFL,fr=legRFoot||defFR;
  const al=armL||{x:cx-22,y:sy+8},ar=armR||{x:cx+22,y:sy+8};
  return <g color={color} opacity={opacity}>
    <Head cx={cx} cy={hy}/>
    <Seg x1={cx} y1={hy+9} x2={cx} y2={sy}/>
    <Seg x1={cx-14} y1={sy} x2={cx+14} y2={sy}/>
    <Seg x1={cx} y1={sy-18} x2={al.x} y2={al.y}/>
    <Seg x1={cx} y1={sy-18} x2={ar.x} y2={ar.y}/>
    <Seg x1={cx-8} y1={sy} x2={ll.x} y2={ll.y}/>
    <Seg x1={ll.x} y1={ll.y} x2={fl.x} y2={fl.y}/>
    <Seg x1={cx+8} y1={sy} x2={lr.x} y2={lr.y}/>
    <Seg x1={lr.x} y1={lr.y} x2={fr.x} y2={fr.y}/>
  </g>;
}

// Lying on back: cx=hip x, y=floor y
function LieFig({cx,floorY,color,opacity=1,kneeAngle=45,legExtR=false}){
  const hy=floorY-8;
  return <g color={color} opacity={opacity}>
    <Head cx={cx-68} cy={floorY-8} r={9}/>
    <Seg x1={cx-60} y1={hy} x2={cx} y2={hy}/>
    <Seg x1={cx-50} y1={hy} x2={cx-45} y2={hy+22}/>
    <Seg x1={cx-38} y1={hy} x2={cx-33} y2={hy+22}/>
    {legExtR
      ? <><Seg x1={cx} y1={hy} x2={cx+40} y2={hy-5}/><Seg x1={cx+40} y1={hy-5} x2={cx+60} y2={hy}/></>
      : <><Seg x1={cx} y1={hy} x2={cx+20} y2={hy-25}/><Seg x1={cx+20} y1={hy-25} x2={cx+32} y2={hy}/></>
    }
    <Seg x1={cx+8} y1={hy} x2={cx+28} y2={hy-20}/><Seg x1={cx+28} y1={hy-20} x2={cx+40} y2={hy}/>
  </g>;
}

// ── Exercise Timer ──
function ExerciseTimer({seconds}){
  const [timeLeft,setTimeLeft]=useState(seconds);
  const [running,setRunning]=useState(false);
  const [done,setDone]=useState(false);
  const intervalRef=React.useRef(null);

  function start(){
    if(done){ setTimeLeft(seconds);setDone(false); }
    setRunning(true);
  }
  function pause(){ setRunning(false); }
  function reset(){ setRunning(false);setTimeLeft(seconds);setDone(false); }

  useEffect(()=>{
    if(running&&timeLeft>0){
      intervalRef.current=setInterval(()=>setTimeLeft(v=>{
        if(v<=1){ setRunning(false);setDone(true);return 0; }
        return v-1;
      }),1000);
    }
    return()=>clearInterval(intervalRef.current);
  },[running]);

  const pct=(timeLeft/seconds)*100;
  const mins=Math.floor(timeLeft/60);
  const secs=timeLeft%60;
  const displayTime=`${mins>0?mins+":":""}${String(secs).padStart(mins>0?2:1,"0")}${mins>0?"":"s"}`;

  return (
    <div style={{background:done?"rgba(157,191,160,0.15)":"rgba(255,245,242,0.7)",
      border:`1px solid ${done?"rgba(157,191,160,0.4)":"rgba(220,180,180,0.25)"}`,
      borderRadius:14,padding:"12px 14px",marginBottom:12,transition:"all 0.3s"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <span style={{fontSize:11,color:C.muted}}>⏱ Timer</span>
        {done&&<span style={{fontSize:11,color:C.sage,fontWeight:600}}>✓ Done!</span>}
      </div>
      {/* Ring progress */}
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <div style={{position:"relative",width:52,height:52,flexShrink:0}}>
          <svg width="52" height="52" viewBox="0 0 52 52">
            <circle cx="26" cy="26" r="22" fill="none" stroke="rgba(180,130,130,0.12)" strokeWidth="4"/>
            <circle cx="26" cy="26" r="22" fill="none"
              stroke={done?C.sage:C.rose} strokeWidth="4"
              strokeDasharray={`${2*Math.PI*22}`}
              strokeDashoffset={`${2*Math.PI*22*(1-pct/100)}`}
              strokeLinecap="round"
              transform="rotate(-90 26 26)"
              style={{transition:"stroke-dashoffset 0.9s linear,stroke 0.3s"}}/>
          </svg>
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:11,fontWeight:700,color:done?C.sage:C.rose,fontFamily:"'Jost',sans-serif"}}>
            {displayTime}
          </div>
        </div>
        <div style={{display:"flex",gap:6,flex:1}}>
          {!running&&!done&&<button onClick={start} className="btn-primary" style={{flex:1,padding:"8px 0",fontSize:12}}>▶ Start</button>}
          {running&&<button onClick={pause} className="btn-soft" style={{flex:1,padding:"8px 0",fontSize:12}}>⏸ Pause</button>}
          {done&&<button onClick={start} className="btn-primary" style={{flex:1,padding:"8px 0",fontSize:12}}>↺ Again</button>}
          {(running||done||timeLeft<seconds)&&<button onClick={reset} className="btn-soft" style={{padding:"8px 12px",fontSize:12}}>↺</button>}
        </div>
      </div>
    </div>
  );
}

// Parse a timed rep string like "45 sec", "2 min", "30 sec ea" → seconds, or null
function parseTimerSeconds(repsStr){
  if(!repsStr) return null;
  const lower=repsStr.toLowerCase();
  const minMatch=lower.match(/(\d+)\s*min/);
  const secMatch=lower.match(/(\d+)\s*sec/);
  if(minMatch) return parseInt(minMatch[1])*60 + (secMatch?parseInt(secMatch[1]):0);
  if(secMatch) return parseInt(secMatch[1]);
  return null;
}

  const [step,setStep]=useState(-1);

  if(done) return (

      {!isRepeat&&(

    </div></div>
  );

  if(step===-1) return (
    <div style={OV}><div style={MB}>
      <button onClick={onClose} style={CB}>✕</button>
      {isRepeat&&(
        <div style={{background:`${C.peach}18`,border:`1px solid ${C.peach}35`,borderRadius:10,padding:"6px 12px",marginBottom:12,fontSize:11,color:C.peach}}>

      <div style={{fontSize:12,color:C.muted,marginBottom:16}}>{workout.type} · {workout.duration} min · +{xpEarned} xp</div>

        ))}

    </div></div>
  );

  const ex=workout.exercises[step];
  const timerSecs=parseTimerSeconds(ex.reps);
  return (
    <div style={OV}><div style={{...MB,textAlign:"center"}}>
      <button onClick={onClose} style={CB}>✕</button>
      <div style={{fontSize:11,color:C.muted,letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>{step+1} of {workout.exercises.length}</div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:C.text,fontStyle:"italic",lineHeight:1.2,marginBottom:10}}>{ex.name}</div>
      <ExerciseDiagram name={ex.name}/>
      <div style={{background:"linear-gradient(135deg,rgba(255,235,235,0.8),rgba(255,245,240,0.8))",border:`1px solid ${C.border}`,borderRadius:14,padding:"14px",marginBottom:timerSecs?8:14}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,color:C.rose}}>{ex.sets} sets × {ex.reps}</div>
        <div style={{fontSize:12,color:C.muted,marginTop:4,fontStyle:"italic"}}>{ex.note}</div>
      </div>
      {timerSecs&&<ExerciseTimer key={`${workout.id}-${step}`} seconds={timerSecs}/>}
      <div style={{display:"flex",gap:8}}>
        {step>0&&<button className="btn-soft" style={{flex:1}} onClick={()=>setStep(s=>s-1)}>← Back</button>}
        <button className="btn-primary" style={{flex:2}} onClick={()=>step<workout.exercises.length-1?setStep(s=>s+1):setDone(true)}>
          {step<workout.exercises.length-1?"Next ✦":"Finish ✨"}
        </button>
      </div>
      <div style={{display:"flex",justifyContent:"center",gap:5,marginTop:14}}>
        {workout.exercises.map((_,i)=>(
          <div key={i} style={{width:i===step?16:5,height:5,borderRadius:99,background:i<=step?C.rose:"rgba(212,116,138,0.18)",transition:"all 0.3s"}}/>
        ))}
      </div>
    </div></div>
  );
}

// ── Boss Modal ──
const PLAYER_MAX_HP = 100;
const BOSS_ATTACKS = [
  {name:"Heavy Blow",    dmg:[12,18], msg:"lands a heavy blow on you"},
  {name:"Dark Surge",    dmg:[8,14],  msg:"unleashes a dark surge"},
  {name:"Crushing Doubt",dmg:[15,22], msg:"fills you with crushing doubt"},
  {name:"Shadow Lunge",  dmg:[10,16], msg:"lunges from the shadows"},
  {name:"Drain",         dmg:[6,10],  msg:"drains your energy"},
];

function BossModal({boss,onClose,onDefeat,charStats,learnedSkills}){
  const [bossHp, setBossHp]   = useState(boss.hp);
  const [playerHp,setPlayerHp]= useState(PLAYER_MAX_HP);
  const [log,    setLog]      = useState([`⚔️ ${boss.name} appears! Weakness: ${boss.weakness}`]);
  const [won,    setWon]      = useState(false);
  const [lost,   setLost]     = useState(false);
  const [cooling,setCooling]  = useState(false); // prevent spam clicking
  const [shake,  setShake]    = useState(false);

  // stat bonus: every 10 combined stats = +1 dmg
  const statBonus = Math.floor((charStats.str+charStats.agi+charStats.pwr)/10);
  // Mana Veil skill halves incoming damage
  const hasManaVeil = learnedSkills.includes("Mana Veil");

  function triggerShake(){ setShake(true); setTimeout(()=>setShake(false),400); }

  function attack(type){
    if(cooling||won||lost) return;
    setCooling(true);
    setTimeout(()=>setCooling(false),700);

    // --- Player attacks boss ---
    const base = boss.dmgTypes[type]||8;
    const isWeak = type===boss.weakness||boss.weakness==="All";
    const playerDmg = Math.max(1, base + statBonus + Math.floor(Math.random()*6));
    const newBossHp = Math.max(0, bossHp - playerDmg);
    setBossHp(newBossHp);

    const hitLabel = isWeak ? `✨ WEAKNESS HIT! ${type} — ${playerDmg} dmg!` : `${type} — ${playerDmg} dmg`;

    if(newBossHp<=0){
      setLog(prev=>[hitLabel,"💀 Boss defeated!","🎉 Victory!",...prev.slice(0,2)]);
      setWon(true);
      return;
    }

    // --- Boss counter-attacks ---
    const bossMove = BOSS_ATTACKS[Math.floor(Math.random()*BOSS_ATTACKS.length)];
    const rawBossDmg = bossMove.dmg[0] + Math.floor(Math.random()*(bossMove.dmg[1]-bossMove.dmg[0]));
    const actualBossDmg = hasManaVeil ? Math.floor(rawBossDmg/2) : rawBossDmg;
    const newPlayerHp = Math.max(0, playerHp - actualBossDmg);
    setPlayerHp(newPlayerHp);
    triggerShake();

    const shieldNote = hasManaVeil ? " (Mana Veil halved!)" : "";
    setLog(prev=>[
      hitLabel,
      `💔 ${boss.name} ${bossMove.msg} — ${actualBossDmg} dmg${shieldNote}`,
      ...prev.slice(0,2)
    ]);

    if(newPlayerHp<=0){ setLost(true); }
  }

  const bossHpPct   = (bossHp/boss.maxHp)*100;
  const playerHpPct = (playerHp/PLAYER_MAX_HP)*100;
  const playerHpColor = playerHpPct>60?C.sage:playerHpPct>30?C.peach:C.rose;

  if(won) return (
    <div style={OV}><div style={{...MB,textAlign:"center",padding:"36px 28px"}}>
      <div style={{fontSize:52,marginBottom:8}}>🎉</div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,color:C.rose,fontStyle:"italic"}}>Victory, Darling!</div>
      <div style={{color:C.muted,fontSize:13,margin:"8px 0 6px"}}>{boss.name} has been defeated.</div>
      <div style={{fontSize:12,color:C.muted,marginBottom:20}}>You finished with <span style={{color:C.sage,fontWeight:600}}>{playerHp} HP</span> remaining.</div>
      <div style={{background:"rgba(255,235,235,0.8)",border:`1px solid ${C.border}`,borderRadius:14,padding:"14px",marginBottom:20}}>
        <div style={{fontSize:14,color:C.rose,fontWeight:600}}>+{boss.xpReward} XP earned ✦</div>
      </div>
      <button className="btn-primary" style={{width:"100%"}} onClick={()=>{onDefeat(boss);onClose();}}>Claim Victory ✦</button>
    </div></div>
  );

  if(lost) return (
    <div style={OV}><div style={{...MB,textAlign:"center",padding:"36px 28px"}}>
      <div style={{fontSize:52,marginBottom:8}}>💔</div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,color:C.muted,fontStyle:"italic"}}>Defeated...</div>
      <div style={{color:C.muted,fontSize:13,margin:"8px 0 20px",fontStyle:"italic",lineHeight:1.6}}>
        {boss.name} was too strong this time. Rest, train more, and return stronger.
      </div>
      <div style={{background:"rgba(255,245,242,0.8)",border:`1px solid ${C.border}`,borderRadius:14,padding:"12px",marginBottom:20,fontSize:12,color:C.muted}}>
        💡 Tip: Build your stats with more workouts, then challenge again. Target the <span style={{color:C.rose,fontWeight:600}}>{boss.weakness}</span> weakness!
      </div>
      <button className="btn-soft" style={{width:"100%"}} onClick={onClose}>Retreat & Train More</button>
    </div></div>
  );

  return (
    <div style={OV}>
      <div style={{...MB, transition:"transform 0.1s", transform:shake?"translateX(-4px)":"translateX(0)"}}>
        <button onClick={onClose} style={CB}>✕</button>

        {/* Boss info */}
        <div style={{textAlign:"center",marginBottom:12}}>
          <div style={{fontSize:40,marginBottom:2}}>{boss.icon}</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,color:C.text}}>{boss.name}</div>
        </div>

        {/* Boss HP */}
        <div style={{marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
            <span style={{fontSize:11,color:C.muted}}>👹 Boss HP</span>
            <span style={{fontSize:11,color:C.rose,fontWeight:600}}>{bossHp} / {boss.maxHp}</span>
          </div>
          <div style={{height:10,background:"rgba(180,130,130,0.12)",borderRadius:99,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${bossHpPct}%`,background:`linear-gradient(90deg,${C.rose},${C.blush})`,borderRadius:99,transition:"width 0.35s"}}/>
          </div>
        </div>

        {/* Player HP */}
        <div style={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
            <span style={{fontSize:11,color:C.muted}}>💗 Your HP</span>
            <span style={{fontSize:11,color:playerHpColor,fontWeight:600}}>{playerHp} / {PLAYER_MAX_HP}</span>
          </div>
          <div style={{height:10,background:"rgba(180,130,130,0.12)",borderRadius:99,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${playerHpPct}%`,background:`linear-gradient(90deg,${playerHpColor}80,${playerHpColor})`,borderRadius:99,transition:"width 0.35s"}}/>
          </div>
          {hasManaVeil&&<div style={{fontSize:10,color:C.lavender,marginTop:3}}>🔵 Mana Veil active — incoming damage halved</div>}
        </div>

        {/* Weakness hint */}
        <div style={{fontSize:11,color:C.rose,textAlign:"center",marginBottom:8,fontStyle:"italic"}}>
          ⚠ Weakness: <strong>{boss.weakness}</strong> — hits hardest!
        </div>

        {/* Attack buttons */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:12}}>
          {["Mobility","Strength","Cardio","Agility","Power"].map(t=>{
            const isWeak=t===boss.weakness||boss.weakness==="All";
            return (
              <button key={t} onClick={()=>attack(t)} disabled={cooling}
                style={{
                  background:isWeak?"linear-gradient(135deg,#e8a0a0,#d4748a)":"rgba(255,255,255,0.8)",
                  color:isWeak?"#fff":C.muted,
                  border:`1px solid ${isWeak?C.rose:"rgba(220,160,160,0.25)"}`,
                  borderRadius:10,padding:"9px 4px",fontSize:11,
                  cursor:cooling?"not-allowed":"pointer",
                  fontFamily:"'Jost',sans-serif",fontWeight:500,
                  opacity:cooling?0.6:1,transition:"opacity 0.2s",
                  boxShadow:isWeak?"0 3px 12px rgba(212,116,138,0.25)":"none",
                }}>
                {t==="Mobility"?"🧘":t==="Strength"?"💪":t==="Cardio"?"🚴":t==="Agility"?"🏃":"⚡"}<br/>
                <span style={{fontSize:10}}>{t}</span>
              </button>
            );
          })}
        </div>

        {/* Battle log */}
        <div style={{background:"rgba(255,245,242,0.8)",borderRadius:12,padding:"8px 12px",marginBottom:10,minHeight:60}}>
          {log.slice(0,3).map((l,i)=>(
            <div key={i} style={{fontSize:11,color:i===0?C.text:C.muted,marginBottom:i<2?3:0,fontWeight:i===0?500:400}}>{l}</div>
          ))}
        </div>

        {/* Flee */}
        <button onClick={onClose} style={{width:"100%",background:"transparent",border:"none",
          fontSize:11,color:C.muted,cursor:"pointer",fontFamily:"'Jost',sans-serif",padding:"4px"}}>
          🏃 Flee the battle
        </button>
      </div>
    </div>
  );
}

function App(){
  const saved=load();
  const [charClass,    setCharClass]    =useState(saved?.charClass||null);
  const [xp,           setXp]           =useState(saved?.xp||0);
  const [completedIds, setCompletedIds] =useState(saved?.completedIds||[]);
  const [streak,       setStreak]       =useState(saved?.streak||0);
  const [totalWorkouts,setTotalWorkouts]=useState(saved?.totalWorkouts||0);
  const [achievements, setAchievements] =useState(saved?.achievements||[]);
  const [questProgress,setQuestProgress]=useState(saved?.questProgress||{workouts:0,mobility:0,bike:0});
  const [defeatedBosses,setDefeatedBosses]=useState(saved?.defeatedBosses||[]);
  const [unlockedGear, setUnlockedGear] =useState(saved?.unlockedGear||[]);
  const [abilityPts,   setAbilityPts]   =useState(saved?.abilityPts||0);
  const [learnedSkills,setLearnedSkills]=useState(saved?.learnedSkills||[]);
  const [charStats,    setCharStats]    =useState(saved?.charStats||{str:1,agi:1,end:1,pwr:1,vit:1});
  const [tab,          setTab]          =useState("home");
  const [activeWorkout,setActiveWorkout]=useState(null);
  const [activeBoss,   setActiveBoss]   =useState(null);
  const [justEarned,   setJustEarned]   =useState(null);
  const [filter,       setFilter]       =useState("All");
  const [saveStatus,   setSaveStatus]   =useState(null);

  const phase=getPhase(xp);
  const cls=CLASSES.find(c=>c.id===charClass)||CLASSES[0];
  const stats={totalXP:xp,streak,totalWorkouts,defeatedBosses,unlockedGear};

  useEffect(()=>{
    if(!charClass) return;
    const ok=save({charClass,xp,completedIds,streak,totalWorkouts,achievements,questProgress,defeatedBosses,unlockedGear,abilityPts,learnedSkills,charStats});
    setSaveStatus(ok?"saved":"error");
    const t=setTimeout(()=>setSaveStatus(null),2000);
    return()=>clearTimeout(t);
  },[charClass,xp,completedIds,streak,totalWorkouts,achievements,questProgress,defeatedBosses,unlockedGear,abilityPts,learnedSkills,charStats]);

  useEffect(()=>{
    if(!charClass) return;
    ACHIEVEMENTS.forEach(a=>{
      if(!achievements.includes(a.id)&&a.condition(stats)){
        setAchievements(prev=>[...prev,a.id]);
        setJustEarned(a);setTimeout(()=>setJustEarned(null),3500);
      }
    });
  },[xp,streak,totalWorkouts,defeatedBosses,unlockedGear]);

  useEffect(()=>{
    GEAR_UNLOCKS.forEach(g=>{
      if(!unlockedGear.includes(g.phase)&&xp>=PHASES.find(p=>p.id===g.phase)?.xpNeeded){
        setUnlockedGear(prev=>[...prev,g.phase]);
      }
    });
  },[xp]);

  function handleComplete(workout, isRepeat=false){
    if(!isRepeat && completedIds.includes(workout.id)) return;
    const xpGain = isRepeat ? Math.floor(workout.xp/2) : workout.xp;
    setXp(v=>v+xpGain);
    if(!isRepeat){
      const gains={...workout.statGains};
      if(gains[cls.bonusStat]) gains[cls.bonusStat]+=2;
      setCompletedIds(prev=>[...prev,workout.id]);
      setCharStats(prev=>{const n={...prev};Object.entries(gains).forEach(([k,v])=>{n[k]=(n[k]||0)+v;});return n;});
    }
    setStreak(v=>v+1);
    setTotalWorkouts(v=>v+1);
    if((totalWorkouts+1)%3===0) setAbilityPts(v=>v+1);
    setQuestProgress(prev=>({
      workouts:prev.workouts+1,
      mobility:prev.mobility+(workout.type.includes("Mobility")?1:0),
      bike:prev.bike+(workout.equipment.includes("Bike")?1:0),
    }));
  }

  function handleBossDefeat(boss){
    setDefeatedBosses(prev=>[...prev,boss.id]);
    setXp(v=>v+boss.xpReward);
  }

  function learnSkill(name){
    const sk=SKILLS_DATA[name];
    if(!sk||abilityPts<sk.cost||learnedSkills.includes(name)) return;
    setAbilityPts(v=>v-sk.cost);
    setLearnedSkills(prev=>[...prev,name]);
    if(sk.stat!=="xp") setCharStats(prev=>({...prev,[sk.stat]:(prev[sk.stat]||0)+sk.bonus}));
  }

  if(!charClass) return <ClassPicker onSelect={setCharClass}/>;

  const filterOpts=["All","Phase 1","Phase 2","Phase 3","Mobility","Strength","Cardio"];
  const visible=WORKOUTS.filter(w=>{
    if(filter==="All") return true;
    if(filter==="Phase 1") return w.phase===1;
    if(filter==="Phase 2") return w.phase===2;
    if(filter==="Phase 3") return w.phase===3;
    if(filter==="Mobility") return w.type.includes("Mobility");
    if(filter==="Strength") return w.type.includes("Strength");
    if(filter==="Cardio") return w.type.includes("Cardio");
    return true;
  });

  const nextBoss=BOSSES.find(b=>!defeatedBosses.includes(b.id))||null;

  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,#fdf0f3 0%,#fdf6f0 50%,#f5f0fd 100%)`,paddingBottom:90}}>

      {justEarned&&(
        <div style={{position:"fixed",top:14,left:"50%",transform:"translateX(-50%)",
          background:"rgba(255,255,255,0.96)",border:`1px solid ${C.rose}35`,borderRadius:16,
          padding:"12px 20px",zIndex:999,display:"flex",alignItems:"center",gap:12,
          boxShadow:"0 8px 32px rgba(212,116,138,0.18)",animation:"slideDown 0.3s ease",minWidth:260,backdropFilter:"blur(10px)"}}>
          <span style={{fontSize:24}}>{justEarned.icon}</span>
          <div>
            <div style={{fontSize:10,color:C.rose,letterSpacing:2,fontWeight:600,textTransform:"uppercase"}}>Achievement ✦</div>
            <div style={{fontSize:14,fontWeight:600,color:C.text}}>{justEarned.title}</div>
          </div>
        </div>
      )}

      {/* Header */}
      <div style={{background:"rgba(253,246,240,0.88)",borderBottom:`1px solid ${C.border}`,
        padding:"16px 20px 12px",position:"sticky",top:0,zIndex:10,backdropFilter:"blur(16px)"}}>
        <div style={{maxWidth:480,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:22,color:C.rose,letterSpacing:0.5}}>
                Comeback Coach ✦
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{fontSize:10,color:C.muted}}>postpartum · strength · sport</div>
                {saveStatus==="saved"&&<div style={{fontSize:10,color:C.sage}}>✓ saved</div>}
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:20,fontWeight:600,color:C.text,lineHeight:1}}>{streak}</div>
                <div style={{fontSize:9,color:"#f97316"}}>🔥 streak</div>
              </div>
              <div style={{width:40,height:40,borderRadius:"50%",
                background:`radial-gradient(circle,${cls.color}25,${cls.color}08)`,
                border:`1.5px solid ${cls.color}50`,
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{cls.icon}</div>
            </div>
          </div>
          <XPBar xp={xp}/>
        </div>
      </div>

      <div style={{maxWidth:480,margin:"0 auto",padding:"0 20px"}}>
        {/* Tabs */}
        <div style={{display:"flex",gap:3,background:"rgba(255,255,255,0.55)",
          borderRadius:14,padding:4,margin:"14px 0",border:`1px solid ${C.border}`}}>
          {[["home","✦ Home"],["train","Train"],["character","Hero"],["quests","Quests"]].map(([id,label])=>(

              <div style={{fontSize:10,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>✦ Gear Collection</div>

        {/* TRAIN */}
        {tab==="train"&&(
          <div>
            <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:6,marginBottom:10}}>
              {PHASES.map(p=>{
                const unlocked=xp>=p.xpNeeded;
                return (
                  <div key={p.id} style={{flex:"0 0 auto",
                    background:unlocked?`${p.color}12`:"rgba(255,255,255,0.4)",
                    border:`1px solid ${unlocked?p.color+"35":"rgba(220,180,180,0.18)"}`,
                    borderRadius:10,padding:"7px 12px",minWidth:95,opacity:unlocked?1:0.5}}>
                    <div style={{fontSize:11,color:unlocked?p.color:C.muted,fontWeight:500}}>{unlocked?"✓ ":"🔒 "}{p.name}</div>
                    <div style={{fontSize:9,color:C.muted}}>{p.weeks}</div>
                  </div>
                );
              })}
            </div>
            <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:8,marginBottom:12}}>
              {filterOpts.map(f=>(
                <button key={f} onClick={()=>setFilter(f)} style={{
                  flex:"0 0 auto",padding:"5px 12px",borderRadius:99,cursor:"pointer",
                  border:`1px solid ${filter===f?C.rose:"rgba(220,160,160,0.22)"}`,
                  background:filter===f?`${C.rose}12`:"rgba(255,255,255,0.6)",
                  color:filter===f?C.rose:C.muted,fontSize:11,fontWeight:500,fontFamily:"'Jost',sans-serif",
                }}>{f}</button>
              ))}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {visible.map(w=><WorkoutCard key={w.id} workout={w} onStart={setActiveWorkout} completed={completedIds.includes(w.id)}/>)}
            </div>
          </div>
        )}

        {/* CHARACTER */}
        {tab==="character"&&(
          <div>
            <div className="card" style={{padding:"20px",marginBottom:14,textAlign:"center"}}>
              <Avatar charClass={charClass} unlockedGear={unlockedGear} size={90}/>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,color:C.text,marginTop:10}}>Your Hero</div>
              <div style={{fontSize:11,color:C.rose,marginTop:2,fontStyle:"italic"}}>{cls.passive}</div>
            </div>
            <div className="card" style={{padding:"16px",marginBottom:14}}>
              <div style={{fontSize:10,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:12}}>⚔️ Stats</div>
              <RadarChart stats={charStats}/>
            </div>
            <div className="card" style={{padding:"16px",marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{fontSize:10,color:C.muted,letterSpacing:2,textTransform:"uppercase"}}>✨ Skills</div>
                <div style={{fontSize:11,color:C.lavender,background:`${C.lavender}12`,border:`1px solid ${C.lavender}28`,borderRadius:99,padding:"2px 10px"}}>
                  {abilityPts} pts
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {cls.skills.map(sk=>{
                  const data=SKILLS_DATA[sk];
                  if(!data) return null;
                  const learned=learnedSkills.includes(sk);
                  const canLearn=abilityPts>=data.cost&&!learned;
                  return (
                    <div key={sk} style={{display:"flex",gap:10,alignItems:"center",
                      background:learned?"rgba(255,235,235,0.6)":"rgba(255,255,255,0.5)",
                      border:`1px solid ${learned?C.rose+"30":"rgba(220,180,180,0.18)"}`,
                      borderRadius:12,padding:"10px 12px"}}>
                      <span style={{fontSize:20}}>{data.icon}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:500,color:C.text}}>{sk}</div>
                        <div style={{fontSize:11,color:C.muted,fontStyle:"italic"}}>{data.desc}</div>
                      </div>
                      {learned
                        ?<span style={{fontSize:11,color:C.sage}}>✓</span>
                        :<button onClick={()=>learnSkill(sk)} disabled={!canLearn}
                          style={{background:canLearn?"linear-gradient(135deg,#e8a0a0,#d4748a)":"rgba(220,180,180,0.18)",
                            color:canLearn?"#fff":C.muted,border:"none",borderRadius:99,
                            padding:"5px 12px",fontSize:11,cursor:canLearn?"pointer":"default",
                            fontFamily:"'Jost',sans-serif",fontWeight:500}}>
                          {data.cost}pt
                        </button>
                      }
                    </div>
                  );
                })}
              </div>
            </div>
            {defeatedBosses.length>0&&(
              <div className="card" style={{padding:"16px",marginBottom:14}}>
                <div style={{fontSize:10,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>🏆 Defeated</div>
                {BOSSES.filter(b=>defeatedBosses.includes(b.id)).map(b=>(
                  <div key={b.id} style={{display:"flex",gap:10,alignItems:"center",marginBottom:6}}>
                    <span style={{fontSize:20}}>{b.icon}</span>
                    <div>
                      <div style={{fontSize:13,fontWeight:500,color:C.text}}>{b.name}</div>
                      <div style={{fontSize:10,color:C.sage}}>+{b.xpReward} xp earned ✓</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* QUESTS */}
        {tab==="quests"&&(
          <div>
            <div className="card-pink" style={{padding:"14px 16px",marginBottom:14}}>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:18,color:C.rose}}>This Week's Quests</div>
              <div style={{fontSize:11,color:C.muted,marginTop:2}}>Complete quests for bonus xp & glory</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
              {WEEKLY_QUESTS.map(q=>{
                const cur=questProgress[q.type]||0,done=cur>=q.target,pct=Math.min(100,(cur/q.target)*100);
                return (
                  <div key={q.id} className="card" style={{padding:"14px 16px",background:done?"rgba(255,235,235,0.65)":"rgba(255,255,255,0.65)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
                      <div>
                        <div style={{fontSize:14,fontWeight:500,color:C.text}}>{done?"🌸 ":""}{q.title}</div>
                        <div style={{fontSize:11,color:C.muted,fontStyle:"italic",marginTop:1}}>{q.desc}</div>
                      </div>
                      <span style={{fontSize:11,color:C.peach,fontWeight:600}}>+{q.xpBonus}</span>
                    </div>
                    <div style={{height:5,background:"rgba(212,116,138,0.1)",borderRadius:99,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${pct}%`,background:done?"linear-gradient(90deg,#9dbfa0,#70c490)":"linear-gradient(90deg,#e8a0a0,#d4748a)",borderRadius:99,transition:"width 0.5s"}}/>
                    </div>
                    <div style={{fontSize:10,color:C.muted,marginTop:4}}>{cur}/{q.target} complete</div>
                  </div>
                );
              })}
            </div>
            <div style={{fontSize:10,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>✦ Achievements</div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
              {ACHIEVEMENTS.map(a=>{
                const earned=achievements.includes(a.id);
                return (
                  <div key={a.id} className="card" style={{display:"flex",gap:12,alignItems:"center",padding:"10px 14px",opacity:earned?1:0.4,background:earned?"rgba(255,235,235,0.65)":"rgba(255,255,255,0.5)"}}>
                    <span style={{fontSize:20,filter:earned?"none":"grayscale(1)"}}>{a.icon}</span>
                    <div>
                      <div style={{fontSize:13,fontWeight:500,color:earned?C.text:C.muted}}>{a.title}</div>
                      <div style={{fontSize:11,color:C.muted,fontStyle:"italic"}}>{a.desc}</div>
                    </div>
                    {earned&&<span style={{marginLeft:"auto",fontSize:12,color:C.sage}}>✓</span>}
                  </div>
                );
              })}
            </div>
            <div style={{fontSize:10,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>💌 Gentle Reminders</div>
            {[
              ["Listen to your body","Pressure, pain, or heaviness = stop. You're rebuilding, not proving anything."],
              ["Pelvic floor first","Core exercises before any jumping. If you feel leaking or heaviness, regress."],
              ["Consistency over intensity","3 shorter sessions > 1 brutal one. Rest is part of the training."],
              ["Sport timeline","Most cleared for running/cutting 12 weeks post-clearance. Tennis & basketball Phase 4."],
            ].map(([t,b])=>(
              <div key={t} className="card" style={{padding:"12px 14px",marginBottom:8,borderLeft:`3px solid ${C.blush}`}}>
                <div style={{fontSize:13,fontWeight:500,color:C.text}}>{t}</div>
                <div style={{fontSize:11,color:C.muted,marginTop:3,fontStyle:"italic",lineHeight:1.5}}>{b}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {activeWorkout&&<WorkoutModal workout={activeWorkout} onClose={()=>setActiveWorkout(null)} onComplete={handleComplete} isRepeat={completedIds.includes(activeWorkout.id)}/>}
      {activeBoss&&<BossModal boss={activeBoss} onClose={()=>setActiveBoss(null)} onDefeat={handleBossDefeat} charStats={charStats} learnedSkills={learnedSkills}/>}

      <style>{`
        @keyframes sparkle{0%,100%{transform:scale(1) rotate(0deg);opacity:1}50%{transform:scale(1.3) rotate(15deg);opacity:0.7}}
        @keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
