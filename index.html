const STORAGE_KEY = "comeback-coach-rpg-v2";
function load(){ try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):null;}catch{return null;} }
function save(s){ try{localStorage.setItem(STORAGE_KEY,JSON.stringify(s));return true;}catch{return false;} }
function getPhase(xp){ for(let i=PHASES.length-1;i>=0;i--) if(xp>=PHASES[i].xpNeeded) return PHASES[i]; return PHASES[0]; }
function getNextPhase(xp){ const c=getPhase(xp); return PHASES.find(p=>p.id===c.id+1)||null; }
function getProgress(xp){ const c=getPhase(xp),n=getNextPhase(xp); if(!n) return 100; return Math.min(100,Math.round(((xp-c.xpNeeded)/(n.xpNeeded-c.xpNeeded))*100)); }

// ── Avatar ──
function Avatar({charClass,unlockedGear,size=110}){
  const cls=CLASSES.find(c=>c.id===charClass)||CLASSES[0];
  const gl=unlockedGear.length;
  const glows=["transparent","rgba(157,191,160,0.3)","rgba(240,184,151,0.35)","rgba(212,116,138,0.4)","rgba(201,168,212,0.5)"];
  const crowns=["","🌿","🎀","🌸","👑"];
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
      <div style={{width:size,height:size,borderRadius:"50%",
        background:`radial-gradient(circle at 40% 35%,rgba(255,255,255,0.95),${cls.color}25)`,
        border:`2px solid ${cls.color}70`,
        boxShadow:`0 0 ${18+gl*8}px ${glows[gl]},0 4px 20px rgba(212,116,138,0.12)`,
        display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
        fontSize:size*0.38,position:"relative",transition:"all 0.4s"}}>
        <span>👩</span>
        {gl>0&&<div style={{position:"absolute",top:-5,right:-2,fontSize:size*0.22,
          animation:"sparkle 2.5s ease-in-out infinite"}}>{crowns[Math.min(gl,4)]}</div>}
        <div style={{position:"absolute",bottom:2,fontSize:size*0.2,opacity:0.85}}>{cls.icon}</div>
      </div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:13,color:cls.color}}>{cls.name}</div>
    </div>
  );
}

// ── Stat Bar ──
function StatBar({statKey,value}){
  const m=statMeta[statKey],pct=Math.min(100,(value/50)*100);
  return (
    <div style={{marginBottom:9}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
        <span style={{fontSize:12,color:C.muted}}>{m.icon} {m.label}</span>
        <span style={{fontSize:12,fontWeight:600,color:m.color}}>{value}</span>
      </div>
      <div style={{height:5,background:"rgba(180,130,130,0.12)",borderRadius:99,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${m.color}70,${m.color})`,borderRadius:99,transition:"width 0.5s"}}/>
      </div>
    </div>
  );
}

// ── Class Picker ──
function ClassPicker({onSelect}){
  const [hov,setHov]=useState(null);
  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,#fdf0f3,#fdf6f0,#f5f0fd)`,
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"30px 20px"}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{fontSize:32,marginBottom:8}}>✦</div>
        <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:40,fontWeight:600,color:C.text,lineHeight:1.1}}>
          Choose Your Class
        </h1>
        <p style={{color:C.muted,fontSize:13,marginTop:10,maxWidth:300,margin:"10px auto 0",fontStyle:"italic"}}>
          Each class shapes how your stats grow. This is where your story begins.
        </p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,maxWidth:480,width:"100%"}}>
        {CLASSES.map(cls=>(
          <div key={cls.id}
            onMouseEnter={()=>setHov(cls.id)} onMouseLeave={()=>setHov(null)}
            onClick={()=>onSelect(cls.id)}
            style={{
              background:hov===cls.id?`linear-gradient(135deg,${cls.color}18,${cls.color}08)`:"rgba(255,255,255,0.8)",
              border:`1.5px solid ${hov===cls.id?cls.color+"70":"rgba(220,160,160,0.25)"}`,
              borderRadius:20,padding:"20px 16px",cursor:"pointer",
              transition:"all 0.25s",
              transform:hov===cls.id?"translateY(-3px)":"none",
              boxShadow:hov===cls.id?`0 10px 30px ${cls.color}20`:"0 2px 12px rgba(212,116,138,0.06)",
            }}>
            <div style={{fontSize:28,marginBottom:8}}>{cls.icon}</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,color:C.text}}>{cls.name}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:4,lineHeight:1.5,fontStyle:"italic"}}>{cls.desc}</div>
            <div style={{marginTop:10,fontSize:10,color:cls.color,fontWeight:500,
              background:`${cls.color}12`,borderRadius:99,padding:"3px 10px",display:"inline-block"}}>
              {cls.passive.split(":")[0]}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── XP Bar ──
function XPBar({xp}){
  const phase=getPhase(xp),next=getNextPhase(xp),pct=getProgress(xp);
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
        <span style={{fontSize:11,color:phase.color,letterSpacing:1,fontWeight:600,textTransform:"uppercase"}}>{phase.name}</span>
        <span style={{fontSize:11,color:C.muted}}>{xp} xp{next?` / ${next.xpNeeded}`:""}</span>
      </div>
      <div style={{height:6,background:"rgba(180,130,130,0.15)",borderRadius:99,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${C.blush},${C.rose})`,borderRadius:99,transition:"width 0.6s ease",boxShadow:`0 0 8px ${C.rose}40`}}/>
      </div>
    </div>
  );
}

// ── Workout Card ──
function WorkoutCard({workout,onStart,completed}){
  const phase=PHASES.find(p=>p.id===workout.phase);
  const [hov,setHov]=useState(false);
  const typeIcon=workout.type.includes("Cardio")?"🚴":workout.type.includes("Mobility")?"🧘":workout.type.includes("Power")?"⚡":workout.type.includes("Agility")?"🏃":"💪";
  return (
    <div onClick={()=>onStart(workout)} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{background:completed?"rgba(255,235,235,0.7)":hov?"rgba(255,255,255,0.92)":"rgba(255,255,255,0.65)",
        border:`1.5px solid ${completed?"rgba(212,116,138,0.35)":hov?"rgba(212,116,138,0.3)":"rgba(220,180,180,0.22)"}`,
        borderRadius:16,padding:"14px 16px",cursor:"pointer",transition:"all 0.2s",
        transform:hov?"translateY(-1px)":"none",
        boxShadow:hov?"0 6px 20px rgba(212,116,138,0.1)":"0 2px 8px rgba(212,116,138,0.05)",
        backdropFilter:"blur(6px)",position:"relative"}}>
      {completed&&<div style={{position:"absolute",top:10,right:12,fontSize:13}}>🌸</div>}
      <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
        <div style={{width:38,height:38,borderRadius:12,flexShrink:0,fontSize:18,
          background:`${phase.color}18`,border:`1px solid ${phase.color}35`,
          display:"flex",alignItems:"center",justifyContent:"center"}}>{typeIcon}</div>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:600,color:C.text}}>{workout.title}</div>
          <div style={{fontSize:11,color:C.muted,marginTop:2}}>{workout.type} · {workout.duration} min</div>
          <div style={{display:"flex",gap:5,marginTop:7,flexWrap:"wrap"}}>
            {workout.equipment.map(e=>(
              <span key={e} style={{fontSize:10,background:"rgba(255,255,255,0.8)",border:"1px solid rgba(220,180,180,0.25)",borderRadius:99,padding:"2px 8px",color:C.muted}}>
                {e==="Bike"?"🚴":e==="Ball"?"⚽":"🧘"} {e}
              </span>
            ))}
            <span style={{fontSize:10,background:`${C.rose}12`,border:`1px solid ${C.rose}25`,borderRadius:99,padding:"2px 8px",color:C.rose}}>+{workout.xp} xp</span>
            {Object.entries(workout.statGains).map(([k,v])=>(
              <span key={k} style={{fontSize:10,background:`${statMeta[k].color}10`,border:`1px solid ${statMeta[k].color}25`,borderRadius:99,padding:"2px 8px",color:statMeta[k].color}}>
                {statMeta[k].icon}+{v}
              </span>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

const OV={position:"fixed",inset:0,background:"rgba(50,20,20,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20,backdropFilter:"blur(8px)"};
const MB={background:"rgba(253,246,240,0.98)",border:"1px solid rgba(220,160,160,0.3)",borderRadius:22,padding:"24px 20px",width:"100%",maxWidth:440,maxHeight:"90vh",overflowY:"auto",position:"relative",boxShadow:"0 20px 60px rgba(212,116,138,0.12)"};
const CB={position:"absolute",top:14,right:14,background:"rgba(220,160,160,0.12)",border:"1px solid rgba(220,160,160,0.2)",borderRadius:99,width:28,height:28,color:C.muted,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"};

// ── Workout Modal ──
function WorkoutModal({workout,onClose,onComplete}){
  const [step,setStep]=useState(-1);
  const [done,setDone]=useState(false);
  if(done) return (
    <div style={OV}><div style={{...MB,textAlign:"center",padding:"40px 28px"}}>
      <div style={{fontSize:52,marginBottom:10}}>✨</div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:30,color:C.rose,fontStyle:"italic"}}>Beautifully Done</div>
      <div style={{color:C.muted,margin:"8px 0 6px",fontSize:13}}>You earned <span style={{color:C.rose,fontWeight:600}}>+{workout.xp} xp</span></div>
      <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap",marginBottom:20}}>
        {Object.entries(workout.statGains).map(([k,v])=>(
          <span key={k} style={{fontSize:12,background:`${statMeta[k].color}12`,color:statMeta[k].color,borderRadius:99,padding:"3px 10px",border:`1px solid ${statMeta[k].color}25`}}>
            {statMeta[k].icon} +{v} {statMeta[k].label}
          </span>
        ))}
      </div>
      <button className="btn-primary" style={{width:"100%"}} onClick={()=>{onComplete(workout);onClose();}}>Collect & Return ✦</button>
    </div></div>
  );
  if(step===-1) return (
    <div style={OV}><div style={MB}>
      <button onClick={onClose} style={CB}>✕</button>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,color:C.text,marginBottom:4}}>{workout.title}</div>
      <div style={{fontSize:12,color:C.muted,marginBottom:16}}>{workout.type} · {workout.duration} min · +{workout.xp} xp</div>
      <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:20}}>
        {workout.exercises.map((ex,i)=>(
          <div key={i} style={{background:"rgba(255,245,242,0.8)",border:"1px solid rgba(220,180,180,0.18)",borderRadius:12,padding:"10px 14px"}}>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{fontSize:13,fontWeight:500,color:C.text}}>{ex.name}</span>
              <span style={{fontSize:11,color:C.muted}}>{ex.sets}×{ex.reps}</span>
            </div>
            <div style={{fontSize:11,color:C.muted,marginTop:2,fontStyle:"italic"}}>{ex.note}</div>
          </div>
        ))}
      </div>
      <button className="btn-primary" style={{width:"100%"}} onClick={()=>setStep(0)}>Begin ✦</button>
    </div></div>
  );
  const ex=workout.exercises[step];
  return (
    <div style={OV}><div style={{...MB,textAlign:"center"}}>
      <button onClick={onClose} style={CB}>✕</button>
      <div style={{fontSize:11,color:C.muted,letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>{step+1} of {workout.exercises.length}</div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,color:C.text,fontStyle:"italic",lineHeight:1.2}}>{ex.name}</div>
      <div style={{background:"linear-gradient(135deg,rgba(255,235,235,0.8),rgba(255,245,240,0.8))",border:`1px solid ${C.border}`,borderRadius:14,padding:"16px",margin:"14px 0"}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:C.rose}}>{ex.sets} sets × {ex.reps}</div>
        <div style={{fontSize:12,color:C.muted,marginTop:5,fontStyle:"italic"}}>{ex.note}</div>
      </div>
      <div style={{display:"flex",gap:8}}>
        {step>0&&<button className="btn-soft" style={{flex:1}} onClick={()=>setStep(s=>s-1)}>← Back</button>}
        <button className="btn-primary" style={{flex:2}} onClick={()=>step<workout.exercises.length-1?setStep(s=>s+1):setDone(true)}>
          {step<workout.exercises.length-1?"Next ✦":"Finish ✨"}
        </button>
      </div>
      <div style={{display:"flex",justifyContent:"center",gap:5,marginTop:14}}>
        {workout.exercises.map((_,i)=>(
          <div key={i} style={{width:i===step?16:5,height:5,borderRadius:99,background:i<=step?C.rose:"rgba(212,116,138,0.18)",transition:"all 0.3s"}}/>
        ))}
      </div>
    </div></div>
  );
}

// ── Boss Modal ──
function BossModal({boss,onClose,onDefeat}){
  const [hp,setHp]=useState(boss.hp);
  const [log,setLog]=useState([]);
  const [won,setWon]=useState(false);
  function attack(type){
    const dmg=Math.max(1,(boss.dmgTypes[type]||8)+Math.floor(Math.random()*6));
    const newHp=Math.max(0,hp-dmg);
    setHp(newHp);
    setLog(prev=>[`${type} strike — ${dmg} damage!`,...prev.slice(0,3)]);
    if(newHp<=0) setWon(true);
  }
  const hpPct=(hp/boss.maxHp)*100;
  if(won) return (
    <div style={OV}><div style={{...MB,textAlign:"center",padding:"36px 28px"}}>
      <div style={{fontSize:52,marginBottom:8}}>🎉</div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,color:C.rose,fontStyle:"italic"}}>Victory, Darling!</div>
      <div style={{color:C.muted,fontSize:13,margin:"8px 0 20px"}}>{boss.name} has been defeated.</div>
      <div style={{background:"rgba(255,235,235,0.8)",border:`1px solid ${C.border}`,borderRadius:14,padding:"14px",marginBottom:20}}>
        <div style={{fontSize:14,color:C.rose,fontWeight:600}}>+{boss.xpReward} XP earned ✦</div>
      </div>
      <button className="btn-primary" style={{width:"100%"}} onClick={()=>{onDefeat(boss);onClose();}}>Claim Victory ✦</button>
    </div></div>
  );
  return (
    <div style={OV}><div style={MB}>
      <button onClick={onClose} style={CB}>✕</button>
      <div style={{textAlign:"center",marginBottom:14}}>
        <div style={{fontSize:44,marginBottom:4}}>{boss.icon}</div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:C.text}}>{boss.name}</div>
        <div style={{fontSize:11,color:C.muted,fontStyle:"italic",marginTop:3}}>{boss.desc}</div>
      </div>
      <div style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
          <span style={{fontSize:11,color:C.muted}}>Boss HP</span>
          <span style={{fontSize:11,color:C.rose}}>{hp} / {boss.maxHp}</span>
        </div>
        <div style={{height:10,background:"rgba(180,130,130,0.12)",borderRadius:99,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${hpPct}%`,background:`linear-gradient(90deg,${C.rose},${C.blush})`,borderRadius:99,transition:"width 0.4s"}}/>
        </div>
        <div style={{fontSize:10,color:C.rose,marginTop:4}}>⚠ Weakness: {boss.weakness}</div>
      </div>
      <div style={{fontSize:12,color:C.muted,marginBottom:8,textAlign:"center",fontStyle:"italic"}}>Choose your attack:</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:14}}>
        {["Mobility","Strength","Cardio","Agility","Power"].map(t=>(
          <button key={t} onClick={()=>attack(t)} style={{
            background:t===boss.weakness?"linear-gradient(135deg,#e8a0a0,#d4748a)":"rgba(255,255,255,0.8)",
            color:t===boss.weakness?"#fff":C.muted,
            border:`1px solid ${t===boss.weakness?C.rose:"rgba(220,160,160,0.25)"}`,
            borderRadius:10,padding:"8px 4px",fontSize:11,cursor:"pointer",fontFamily:"'Jost',sans-serif",
            boxShadow:t===boss.weakness?"0 3px 12px rgba(212,116,138,0.25)":"none",
          }}>
            {t==="Mobility"?"🧘":t==="Strength"?"💪":t==="Cardio"?"🚴":t==="Agility"?"🏃":"⚡"} {t}
          </button>
        ))}
      </div>
      {log.length>0&&(
        <div style={{background:"rgba(255,245,242,0.8)",borderRadius:12,padding:"8px 12px"}}>
          {log.map((l,i)=><div key={i} style={{fontSize:11,color:i===0?C.rose:C.muted,marginBottom:i<log.length-1?3:0}}>{l}</div>)}
        </div>
      )}
    </div></div>
  );
}

//  MAIN APP
// ══════════════════════════════════════════════════════
function App(){
  const saved=load();
  const [charClass,    setCharClass]    =useState(saved?.charClass||null);
  const [xp,           setXp]           =useState(saved?.xp||0);
  const [completedIds, setCompletedIds] =useState(saved?.completedIds||[]);
  const [streak,       setStreak]       =useState(saved?.streak||0);
  const [totalWorkouts,setTotalWorkouts]=useState(saved?.totalWorkouts||0);
  const [achievements, setAchievements] =useState(saved?.achievements||[]);
  const [questProgress,setQuestProgress]=useState(saved?.questProgress||{workouts:0,mobility:0,bike:0});
  const [defeatedBosses,setDefeatedBosses]=useState(saved?.defeatedBosses||[]);
  const [unlockedGear, setUnlockedGear] =useState(saved?.unlockedGear||[]);
  const [abilityPts,   setAbilityPts]   =useState(saved?.abilityPts||0);
  const [learnedSkills,setLearnedSkills]=useState(saved?.learnedSkills||[]);
  const [charStats,    setCharStats]    =useState(saved?.charStats||{str:1,agi:1,end:1,pwr:1,vit:1});
  const [tab,          setTab]          =useState("home");
  const [activeWorkout,setActiveWorkout]=useState(null);
  const [activeBoss,   setActiveBoss]   =useState(null);
  const [justEarned,   setJustEarned]   =useState(null);
  const [filter,       setFilter]       =useState("All");
  const [saveStatus,   setSaveStatus]   =useState(null);

  const phase=getPhase(xp);
  const cls=CLASSES.find(c=>c.id===charClass)||CLASSES[0];
  const stats={totalXP:xp,streak,totalWorkouts,defeatedBosses,unlockedGear};

  useEffect(()=>{
    if(!charClass) return;
    const ok=save({charClass,xp,completedIds,streak,totalWorkouts,achievements,questProgress,defeatedBosses,unlockedGear,abilityPts,learnedSkills,charStats});
    setSaveStatus(ok?"saved":"error");
    const t=setTimeout(()=>setSaveStatus(null),2000);
    return()=>clearTimeout(t);
  },[charClass,xp,completedIds,streak,totalWorkouts,achievements,questProgress,defeatedBosses,unlockedGear,abilityPts,learnedSkills,charStats]);

  useEffect(()=>{
    if(!charClass) return;
    ACHIEVEMENTS.forEach(a=>{
      if(!achievements.includes(a.id)&&a.condition(stats)){
        setAchievements(prev=>[...prev,a.id]);
        setJustEarned(a);setTimeout(()=>setJustEarned(null),3500);
      }
    });
  },[xp,streak,totalWorkouts,defeatedBosses,unlockedGear]);

  useEffect(()=>{
    GEAR_UNLOCKS.forEach(g=>{
      if(!unlockedGear.includes(g.phase)&&xp>=PHASES.find(p=>p.id===g.phase)?.xpNeeded){
        setUnlockedGear(prev=>[...prev,g.phase]);
      }
    });
  },[xp]);

  function handleComplete(workout){
    if(completedIds.includes(workout.id)) return;
    const gains={...workout.statGains};
    if(gains[cls.bonusStat]) gains[cls.bonusStat]+=2;
    setXp(v=>v+workout.xp);
    setCompletedIds(prev=>[...prev,workout.id]);
    setStreak(v=>v+1);
    setTotalWorkouts(v=>v+1);
    setCharStats(prev=>{const n={...prev};Object.entries(gains).forEach(([k,v])=>{n[k]=(n[k]||0)+v;});return n;});
    if((totalWorkouts+1)%3===0) setAbilityPts(v=>v+1);
    setQuestProgress(prev=>({
      workouts:prev.workouts+1,
      mobility:prev.mobility+(workout.type.includes("Mobility")?1:0),
      bike:prev.bike+(workout.equipment.includes("Bike")?1:0),
    }));
  }

  function handleBossDefeat(boss){
    setDefeatedBosses(prev=>[...prev,boss.id]);
    setXp(v=>v+boss.xpReward);
  }

  function learnSkill(name){
    const sk=SKILLS_DATA[name];
    if(!sk||abilityPts<sk.cost||learnedSkills.includes(name)) return;
    setAbilityPts(v=>v-sk.cost);
    setLearnedSkills(prev=>[...prev,name]);
    if(sk.stat!=="xp") setCharStats(prev=>({...prev,[sk.stat]:(prev[sk.stat]||0)+sk.bonus}));
  }

  if(!charClass) return <ClassPicker onSelect={setCharClass}/>;

  const filterOpts=["All","Phase 1","Phase 2","Phase 3","Mobility","Strength","Cardio"];
  const visible=WORKOUTS.filter(w=>{
    if(filter==="All") return true;
    if(filter==="Phase 1") return w.phase===1;
    if(filter==="Phase 2") return w.phase===2;
    if(filter==="Phase 3") return w.phase===3;
    if(filter==="Mobility") return w.type.includes("Mobility");
    if(filter==="Strength") return w.type.includes("Strength");
    if(filter==="Cardio") return w.type.includes("Cardio");
    return true;
  });

  const nextBoss=BOSSES.find(b=>!defeatedBosses.includes(b.id))||null;

  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,#fdf0f3 0%,#fdf6f0 50%,#f5f0fd 100%)`,paddingBottom:90}}>

      {justEarned&&(
        <div style={{position:"fixed",top:14,left:"50%",transform:"translateX(-50%)",
          background:"rgba(255,255,255,0.96)",border:`1px solid ${C.rose}35`,borderRadius:16,
          padding:"12px 20px",zIndex:999,display:"flex",alignItems:"center",gap:12,
          boxShadow:"0 8px 32px rgba(212,116,138,0.18)",animation:"slideDown 0.3s ease",minWidth:260,backdropFilter:"blur(10px)"}}>
          <span style={{fontSize:24}}>{justEarned.icon}</span>
          <div>
            <div style={{fontSize:10,color:C.rose,letterSpacing:2,fontWeight:600,textTransform:"uppercase"}}>Achievement ✦</div>
            <div style={{fontSize:14,fontWeight:600,color:C.text}}>{justEarned.title}</div>
          </div>
        </div>
      )}

      {/* Header */}
      <div style={{background:"rgba(253,246,240,0.88)",borderBottom:`1px solid ${C.border}`,
        padding:"16px 20px 12px",position:"sticky",top:0,zIndex:10,backdropFilter:"blur(16px)"}}>
        <div style={{maxWidth:480,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:22,color:C.rose,letterSpacing:0.5}}>
                Comeback Coach ✦
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{fontSize:10,color:C.muted}}>postpartum · strength · sport</div>
                {saveStatus==="saved"&&<div style={{fontSize:10,color:C.sage}}>✓ saved</div>}
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:20,fontWeight:600,color:C.text,lineHeight:1}}>{streak}</div>
                <div style={{fontSize:9,color:"#f97316"}}>🔥 streak</div>
              </div>
              <div style={{width:40,height:40,borderRadius:"50%",
                background:`radial-gradient(circle,${cls.color}25,${cls.color}08)`,
                border:`1.5px solid ${cls.color}50`,
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{cls.icon}</div>
            </div>
          </div>
          <XPBar xp={xp}/>
        </div>
      </div>

      <div style={{maxWidth:480,margin:"0 auto",padding:"0 20px"}}>
        {/* Tabs */}
        <div style={{display:"flex",gap:3,background:"rgba(255,255,255,0.55)",
          borderRadius:14,padding:4,margin:"14px 0",border:`1px solid ${C.border}`}}>
          {[["home","✦ Home"],["train","Train"],["character","Hero"],["quests","Quests"]].map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)} style={{
              flex:1,padding:"8px 4px",border:"none",borderRadius:10,cursor:"pointer",
              background:tab===id?"linear-gradient(135deg,#e8a0a0,#d4748a)":"transparent",
              color:tab===id?"#fff":C.muted,
              fontFamily:"'Jost',sans-serif",fontWeight:500,fontSize:11,transition:"all 0.2s",

            }}>{label}</button>

        {/* HOME */}
        {tab==="home"&&(
          <div>
            <div className="card" style={{padding:"24px 20px",textAlign:"center",marginBottom:14}}>

              <div style={{marginTop:14,display:"flex",justifyContent:"center",gap:6,flexWrap:"wrap"}}>

                  <div key={k} style={{background:`${statMeta[k].color}10`,border:`1px solid ${statMeta[k].color}25`,borderRadius:99,padding:"3px 10px",fontSize:11,color:statMeta[k].color,fontWeight:500}}>

                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,color:C.text}}>{nextBoss.name}</div>

                <button key={f} onClick={()=>setFilter(f)} style={{
                  flex:"0 0 auto",padding:"5px 12px",borderRadius:99,cursor:"pointer",

            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {visible.map(w=><WorkoutCard key={w.id} workout={w} onStart={setActiveWorkout} completed={completedIds.includes(w.id)}/>)}
            </div>
          </div>
        )}

        {/* CHARACTER */}
        {tab==="character"&&(
          <div>
            <div className="card" style={{padding:"20px",marginBottom:14,textAlign:"center"}}>
              <Avatar charClass={charClass} unlockedGear={unlockedGear} size={90}/>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,color:C.text,marginTop:10}}>Your Hero</div>
              <div style={{fontSize:11,color:C.rose,marginTop:2,fontStyle:"italic"}}>{cls.passive}</div>
            </div>
            <div className="card" style={{padding:"16px",marginBottom:14}}>
              <div style={{fontSize:10,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:12}}>⚔️ Stats</div>
              {Object.entries(charStats).map(([k,v])=><StatBar key={k} statKey={k} value={v}/>)}
            </div>
            <div className="card" style={{padding:"16px",marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{fontSize:10,color:C.muted,letterSpacing:2,textTransform:"uppercase"}}>✨ Skills</div>
                <div style={{fontSize:11,color:C.lavender,background:`${C.lavender}12`,border:`1px solid ${C.lavender}28`,borderRadius:99,padding:"2px 10px"}}>
                  {abilityPts} pts
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {cls.skills.map(sk=>{
                  const data=SKILLS_DATA[sk];
                  if(!data) return null;
                  const learned=learnedSkills.includes(sk);
                  const canLearn=abilityPts>=data.cost&&!learned;
                  return (
                    <div key={sk} style={{display:"flex",gap:10,alignItems:"center",
                      background:learned?"rgba(255,235,235,0.6)":"rgba(255,255,255,0.5)",
                      border:`1px solid ${learned?C.rose+"30":"rgba(220,180,180,0.18)"}`,
                      borderRadius:12,padding:"10px 12px"}}>
                      <span style={{fontSize:20}}>{data.icon}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:500,color:C.text}}>{sk}</div>
                        <div style={{fontSize:11,color:C.muted,fontStyle:"italic"}}>{data.desc}</div>
                      </div>
                      {learned
                        ?<span style={{fontSize:11,color:C.sage}}>✓</span>
                        :<button onClick={()=>learnSkill(sk)} disabled={!canLearn}
                          style={{background:canLearn?"linear-gradient(135deg,#e8a0a0,#d4748a)":"rgba(220,180,180,0.18)",
                            color:canLearn?"#fff":C.muted,border:"none",borderRadius:99,
                            padding:"5px 12px",fontSize:11,cursor:canLearn?"pointer":"default",
                            fontFamily:"'Jost',sans-serif",fontWeight:500}}>
                          {data.cost}pt
                        </button>
                      }
                    </div>
                  );
                })}
              </div>
            </div>
            {defeatedBosses.length>0&&(
              <div className="card" style={{padding:"16px",marginBottom:14}}>
                <div style={{fontSize:10,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>🏆 Defeated</div>
                {BOSSES.filter(b=>defeatedBosses.includes(b.id)).map(b=>(
                  <div key={b.id} style={{display:"flex",gap:10,alignItems:"center",marginBottom:6}}>
                    <span style={{fontSize:20}}>{b.icon}</span>
                    <div>
                      <div style={{fontSize:13,fontWeight:500,color:C.text}}>{b.name}</div>
                      <div style={{fontSize:10,color:C.sage}}>+{b.xpReward} xp earned ✓</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* QUESTS */}
        {tab==="quests"&&(
          <div>
            <div className="card-pink" style={{padding:"14px 16px",marginBottom:14}}>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:18,color:C.rose}}>This Week's Quests</div>
              <div style={{fontSize:11,color:C.muted,marginTop:2}}>Complete quests for bonus xp & glory</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
              {WEEKLY_QUESTS.map(q=>{
                const cur=questProgress[q.type]||0,done=cur>=q.target,pct=Math.min(100,(cur/q.target)*100);
                return (
                  <div key={q.id} className="card" style={{padding:"14px 16px",background:done?"rgba(255,235,235,0.65)":"rgba(255,255,255,0.65)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
                      <div>
                        <div style={{fontSize:14,fontWeight:500,color:C.text}}>{done?"🌸 ":""}{q.title}</div>
                        <div style={{fontSize:11,color:C.muted,fontStyle:"italic",marginTop:1}}>{q.desc}</div>
                      </div>
                      <span style={{fontSize:11,color:C.peach,fontWeight:600}}>+{q.xpBonus}</span>
                    </div>
                    <div style={{height:5,background:"rgba(212,116,138,0.1)",borderRadius:99,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${pct}%`,background:done?"linear-gradient(90deg,#9dbfa0,#70c490)":"linear-gradient(90deg,#e8a0a0,#d4748a)",borderRadius:99,transition:"width 0.5s"}}/>
                    </div>
                    <div style={{fontSize:10,color:C.muted,marginTop:4}}>{cur}/{q.target} complete</div>
                  </div>
                );
              })}
            </div>
            <div style={{fontSize:10,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>✦ Achievements</div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
              {ACHIEVEMENTS.map(a=>{
                const earned=achievements.includes(a.id);
                return (
                  <div key={a.id} className="card" style={{display:"flex",gap:12,alignItems:"center",padding:"10px 14px",opacity:earned?1:0.4,background:earned?"rgba(255,235,235,0.65)":"rgba(255,255,255,0.5)"}}>
                    <span style={{fontSize:20,filter:earned?"none":"grayscale(1)"}}>{a.icon}</span>
                    <div>
                      <div style={{fontSize:13,fontWeight:500,color:earned?C.text:C.muted}}>{a.title}</div>
                      <div style={{fontSize:11,color:C.muted,fontStyle:"italic"}}>{a.desc}</div>
                    </div>
                    {earned&&<span style={{marginLeft:"auto",fontSize:12,color:C.sage}}>✓</span>}
                  </div>
                );
              })}
            </div>
            <div style={{fontSize:10,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>💌 Gentle Reminders</div>
            {[
              ["Listen to your body","Pressure, pain, or heaviness = stop. You're rebuilding, not proving anything."],
              ["Pelvic floor first","Core exercises before any jumping. If you feel leaking or heaviness, regress."],
              ["Consistency over intensity","3 shorter sessions > 1 brutal one. Rest is part of the training."],
              ["Sport timeline","Most cleared for running/cutting 12 weeks post-clearance. Tennis & basketball Phase 4."],
            ].map(([t,b])=>(
              <div key={t} className="card" style={{padding:"12px 14px",marginBottom:8,borderLeft:`3px solid ${C.blush}`}}>
                <div style={{fontSize:13,fontWeight:500,color:C.text}}>{t}</div>
                <div style={{fontSize:11,color:C.muted,marginTop:3,fontStyle:"italic",lineHeight:1.5}}>{b}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {activeWorkout&&<WorkoutModal workout={activeWorkout} onClose={()=>setActiveWorkout(null)} onComplete={handleComplete}/>}
      {activeBoss&&<BossModal boss={activeBoss} onClose={()=>setActiveBoss(null)} onDefeat={handleBossDefeat}/>}

      <style>{`
        @keyframes sparkle{0%,100%{transform:scale(1) rotate(0deg);opacity:1}50%{transform:scale(1.3) rotate(15deg);opacity:0.7}}
        @keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
